# NewsPulse - MERN Stack Docker Setup

version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: newspulse-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: newspulse
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - newspulse-network

  # Backend API Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: newspulse-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/newspulse
      - JWT_SECRET=newspulse-super-secret-jwt-key-2024
      - CLIENT_URL=http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - newspulse-network

  # Frontend Next.js App
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: newspulse-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - newspulse-network

volumes:
  mongodb_data:

networks:
  newspulse-network:
    driver: bridge
